<!DOCTYPE html>
<html>
<head>
    <title>Reservas - El Descansito</title>
    <meta charset="UTF-8">
    <style>
        body{font-family:Arial;padding:20px;background:#f5f5}
        h1{color:#e67e22}
        table{width:100%;background:white;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border:1px solid #ddd;text-align:left}
        th{background:#e67e22;color:white}
    </style>
</head>
<body>
    <h1>📅 Reservas</h1>
    <div id="stats"></div>
    <table id="tabla">
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>Personas</th><th>Fecha</th>
                <th>Hora</th><th>Teléfono</th><th>Estado</th><th>Comentarios</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
fetch('/reservas').then(r=>r.json()).then(d=>{
    document.getElementById('stats').innerHTML = `<h3>Total: ${d.total}</h3>`;
    const tbody = document.querySelector('#tabla tbody');
    tbody.innerHTML = d.reservas.map(r=>`
        <tr>
            <td>#${r.id}</td>
            <td>${r.nombre}</td>
            <td>${r.personas}</td>
            <td>${r.fecha}</td>
            <td>${r.hora}</td>
            <td>${r.telefono || '-'}</td>
            <td>${r.estado}</td>
            <td>${r.comentarios || '-'}</td>
        </tr>
    `).join('');
}).catch(err=>{
    console.error('Error cargando reservas:', err);
    document.querySelector('#tabla tbody').innerHTML = '<tr><td colspan="8">Error cargando datos</td></tr>';
});
</script>
</body>
</html>
