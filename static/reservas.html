<!DOCTYPE html>
<html>
<head>
    <title>Reservas - El Descansito</title>
    <meta charset="UTF-8">
    <style>
        body{font-family:Arial;padding:20px;background:#f5f5f5}
        h1{color:#e67e22}
        table{width:100%;background:white;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border:1px solid #ddd;text-align:left}
        th{background:#e67e22;color:white}
        .btn{border:none;padding:5px 10px;border-radius:4px;cursor:pointer;margin-right:5px;color:white}
        .btn-editar{background:#3498db}
        .btn-cancelar{background:#e74c3c}
        .btn:hover{opacity:0.8}
    </style>
</head>
<body>
    <h1>📅 Reservas</h1>
    <div id="stats"></div>
    <table id="tabla">
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>Personas</th><th>Fecha</th>
                <th>Hora</th><th>Teléfono</th><th>Estado</th><th>Comentarios</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
function cancelar(id) {
    if (!confirm(`¿Cancelar reserva #${id}?`)) return;
    fetch(`/cancelar-reserva/${id}`, {method: 'POST'})
      .then(r => r.json())
      .then(d => {
          if(d.ok) {
              alert('Reserva cancelada');
              location.reload();
          } else {
              alert('Error: ' + d.error);
          }
      });
}

function editar(id) {
    fetch(`/reserva/${id}`).then(r=>r.json()).then(res => {
        if(res.error) return alert(res.error);
        const nombre = prompt("Nombre:", res.nombre);
        if(!nombre) return;
        const personas = prompt("Personas:", res.personas);
        const fecha = prompt("Fecha DD/MM/YYYY:", res.fecha || '');
        const hora = prompt("Hora HH:MM:", res.hora || '');
        
        fetch(`/editar-reserva/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                nombre, 
                personas: parseInt(personas), 
                fecha, 
                hora
            })
        }).then(r=>r.json()).then(d => {
            if(d.ok) {
                alert('Reserva actualizada');
                location.reload();
            } else {
                alert('Error: ' + d.error);
            }
        });
    });
}

fetch('/reservas')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(d => {
    document.getElementById('stats').innerHTML = `<h3>Total: ${d.total}</h3>`;
    const tbody = document.querySelector('#tabla tbody');
    tbody.innerHTML = d.reservas.map(r=>`
        <tr>
            <td>#${r.id}</td>
            <td>${r.nombre}</td>
            <td>${r.personas}</td>
            <td>${r.fecha}</td>
            <td>${r.hora}</td>
            <td>${r.telefono || '-'}</td>
            <td>${r.estado}</td>
            <td>${r.comentarios || '-'}</td>
            <td>
                ${r.estado === 'confirmada' ? 
                  `<button class="btn btn-editar" onclick="editar(${r.id})">Editar</button>
                   <button class="btn btn-cancelar" onclick="cancelar(${r.id})">Cancelar</button>` 
                  : '-'}
            </td>
        </tr>
    `).join('');
  })
  .catch(err => {
    console.error('Error:', err);
    document.querySelector('#tabla tbody').innerHTML = 
      `<tr><td colspan="9">Error: ${err.message}</td></tr>`;
  });
</script>
</body>
</html>
