<!DOCTYPE html>
<html>
<head>
    <title>Panel - El Descansito</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, Arial; background: #f5f5f5; padding: 20px; max-width: 700px; margin: 0 auto; }
       .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 40px; }
        h1 { color: #e67e22; text-align: center; margin-bottom: 30px; font-size: 28px; }
       .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; background: #e67e22; color: white; 
               text-decoration: none; text-align: center; border-radius: 10px; font-size: 20px; font-weight: bold;
               border: none; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.15); transition: all 0.2s; }
       .btn:hover { background: #d35400; transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0,0,0,0.2); }
       .btn.green { background: #27ae60; }
       .btn.green:hover { background: #229954; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🍽️ El Descansito - Panel Admin</h1>
        
        <a href="/stats-page" class="btn">📊 Ver Estadísticas</a>
        <a href="/reservas-page" class="btn">📅 Ver Reservas</a>
        <a href="/pedidos-page" class="btn">🛵 Ver Pedidos</a>
        <button onclick="walkIn()" class="btn green">➕ Walk-in Rápido</button>
    </div>

<script>
async function walkIn() {
    const personas = prompt('¿Cuántas personas para el walk-in?');
    if (!personas || personas < 1) return;
    const nombre = prompt('Nombre del cliente:', 'Walk-in') || 'Walk-in';
    
    const res = await fetch(`/reserva/walk-in`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({nombre, personas: parseInt(personas)})
    });
    const data = await res.json();
    alert(data.ok? `✅ Walk-in #${data.id} registrado` : `❌ Error: ${data.error}`);
}
</script>
</body>
</html>
