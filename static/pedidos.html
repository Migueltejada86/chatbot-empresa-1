<!DOCTYPE html>
<html>
<head>
    <title>Pedidos - El Descansito</title>
    <meta charset="UTF-8">
    <style>
        body{font-family:Arial;padding:20px;background:#f5f5f5}
        h1{color:#e67e22}
        table{width:100%;background:white;border-collapse:collapse;margin-top:20px}
        th,td{padding:12px;border:1px solid #ddd;text-align:left}
        th{background:#e67e22;color:white}
        .estado{padding:4px 8px;border-radius:4px;font-size:12px}
        .pendiente{background:#f39c12;color:white}
        .en_camino{background:#3498db;color:white}
        .entregado{background:#27ae60;color:white}
    </style>
</head>
<body>
    <h1>🍽 Pedidos</h1>
    <div id="stats"></div>
    <table id="tabla">
        <thead>
            <tr>
                <th>ID</th><th>Tipo</th><th>Cliente</th><th>Teléfono</th>
                <th>Dirección</th><th>Items</th><th>Total</th><th>Estado</th><th>Fecha</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
fetch('/pedidos').then(r=>r.json()).then(d=>{
    document.getElementById('stats').innerHTML = `<h3>Total: ${d.total}</h3>`;
    const tbody = document.querySelector('#tabla tbody');
    tbody.innerHTML = d.pedidos.map(p=>{
        const items = JSON.parse(p.items).map(i=>`${i.cantidad}x ${i.nombre}`).join(', ');
        return `<tr>
            <td>#${p.id}</td>
            <td>${p.tipo}</td>
            <td>${p.nombre}</td>
            <td>${p.telefono}</td>
            <td>${p.direccion || '-'}</td>
            <td>${items}</td>
            <td>$${p.total}</td>
            <td><span class="estado ${p.estado}">${p.estado}</span></td>
            <td>${p.creado}</td>
        </tr>`
    }).join('');
});
</script>
</body>
</html>
